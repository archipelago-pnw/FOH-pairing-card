<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Archipelago — Wine Pairing</title>
<style>
:root{
  --k:#c8a96e;--kl:#d9be8a;--km:#a07840;
  --ink:#1a1008;--ink2:#2e1e0c;--ink3:#3d2b14;
  --cr:#f2e8d8;--cr2:#d9c9b0;--cr3:#b8a48a;
  --bd:#4a3318;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ink);height:100%;font-family:"Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;color:var(--cr);}

/* Each screen fills the full viewport as a flex column */
.screen{display:none;flex-direction:column;height:100vh;}
.screen.active{display:flex;}

/* Top bar */
.top-bar{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;gap:12px;}
.top-bar .b{fill:var(--k);}
.bar-title{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--km);flex:1;}
.back-btn{background:none;border:none;color:var(--km);font-family:inherit;font-size:14px;cursor:pointer;padding:6px 0;min-width:60px;}

/* Home */
.date-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.field-label{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--km);}
input[type=date]{background:var(--ink2);border:1px solid var(--bd);color:var(--cr);font-family:inherit;font-size:15px;padding:8px 12px;outline:none;flex:1;-webkit-appearance:none;border-radius:0;}
input[type=date]:focus{border-color:var(--k);}
.sec-pad{padding:12px 20px 8px;flex-shrink:0;}
.sec-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--km);}
.season-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px;flex-shrink:0;}
.season-btn{background:var(--ink2);border:1px solid var(--bd);color:var(--cr2);font-family:inherit;font-size:13px;padding:14px 12px;cursor:pointer;text-align:center;}
.season-btn.selected{background:rgba(200,169,110,.15);border-color:var(--k);color:var(--cr);}
.divider{height:1px;background:var(--bd);margin:12px 20px;flex-shrink:0;}
.actions{padding:0 20px 20px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}

/* Buttons */
.abtn{width:100%;padding:16px 20px;font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:14px;border:1px solid;text-align:left;}
.abtn .icon{font-size:18px;flex-shrink:0;}
.abtn .sub{font-size:11px;margin-top:2px;}
.abtn-gold{background:var(--k);border-color:var(--k);color:var(--ink);}
.abtn-gold .sub{color:var(--ink3);}
.abtn-gold:active{background:var(--kl);}
.abtn-gold:disabled{opacity:.35;pointer-events:none;}
.abtn-dark{background:var(--ink2);border-color:var(--bd);color:var(--cr);}
.abtn-dark .sub{color:var(--cr3);}
.abtn-dark:disabled{opacity:.35;pointer-events:none;}
.abtn-ghost{background:transparent;border-color:var(--bd);color:var(--cr3);}

/* Scrollable list area */
.list-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 20px;display:flex;flex-direction:column;gap:6px;}

/* Wine/pairing rows */
.slot{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--ink2);border:1px solid var(--bd);}
.swap-slot{cursor:pointer;}
.swap-slot:active{background:var(--ink3);}
.swap-slot.swapped{background:rgba(200,169,110,.12);border-color:var(--k);}
.slot-num{font-size:10px;letter-spacing:.2em;color:var(--km);width:22px;flex-shrink:0;text-align:center;}
.slot-info{flex:1;}
.slot-producer,.picker-producer{font-size:14px;color:var(--cr);}
.slot-name,.picker-name{font-size:12px;font-style:italic;color:var(--cr2);margin-top:2px;}
.slot-vintage,.picker-vintage{font-size:13px;color:var(--k);flex-shrink:0;}
.swap-badge{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink);background:var(--k);padding:2px 6px;flex-shrink:0;}
.swap-arrow{color:var(--km);font-size:18px;flex-shrink:0;}

/* Bottom bar — always visible */
.bottom-bar{padding:12px 20px;border-top:1px solid var(--bd);flex-shrink:0;background:var(--ink);}

/* Search */
.search-wrap{padding:10px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.search-input{width:100%;background:var(--ink2);border:1px solid var(--bd);color:var(--cr);font-family:inherit;font-size:15px;padding:11px 14px;outline:none;border-radius:0;-webkit-appearance:none;}
.search-input:focus{border-color:var(--k);}
.search-input::placeholder{color:var(--cr3);}

/* Custom */
.counter{padding:10px 20px;font-size:11px;letter-spacing:.15em;color:var(--km);border-bottom:1px solid var(--bd);flex-shrink:0;}
.custom-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--bd);cursor:pointer;}
.custom-item:active{background:var(--ink2);}
.custom-item.sel{background:rgba(200,169,110,.1);}
.custom-item.dim{opacity:.3;pointer-events:none;}
.check-box{width:20px;height:20px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.custom-item.sel .check-box{background:var(--k);border-color:var(--k);}
.check-mark{font-size:11px;color:var(--ink);display:none;}
.custom-item.sel .check-mark{display:block;}

/* Print bar — slides in above bottom bar */
.print-bar{display:none;background:var(--ink2);border-top:2px solid var(--k);flex-shrink:0;padding:14px 20px;flex-direction:row;align-items:center;gap:10px;}
.print-bar.visible{display:flex;}
.pbtn{padding:14px 20px;font-family:inherit;font-size:11px;font-weight:bold;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border:none;flex:1;text-align:center;}
.pbtn-go{background:var(--k);color:var(--ink);}
.pbtn-go:active{background:var(--kl);}
.pbtn-back{background:transparent;border:1px solid var(--bd)!important;color:var(--cr3);flex:0 0 auto;padding:14px 16px;}
</style>
</head>

function fmtDate(s) {
  if (!s) return '';
  var p = s.split('-');
  var mo = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return mo[+p[1]-1] + ' ' + +p[2] + ', ' + p[0];
}

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+id).classList.add('active');
}
function goHome() { show('home'); }

function renderSeasons() {
  var g = document.getElementById('season-grid');
  g.innerHTML = '';
  seasonNames.forEach(function(name) {
    var b = document.createElement('button');
    b.className = 'season-btn';
    b.textContent = name;
    b.onclick = function(){ selectSeason(name, b); };
    g.appendChild(b);
  });
}

function selectSeason(name, btn) {
  activeSeason = name;
  swapPairings = seasons[name].pairing.map(function(w){ return Object.assign({},w,{swapped:false}); });
  document.querySelectorAll('.season-btn').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  document.getElementById('btn-standard').disabled = false;
  document.getElementById('btn-swap').disabled = false;
}

function goStandard() {
  if (!activeSeason) return;
  currentMode = 'standard';
  document.getElementById('standard-title').textContent = activeSeason;
  var list = document.getElementById('pairing-list');
  list.innerHTML = '';
  seasons[activeSeason].pairing.forEach(function(w, i) {
    var el = document.createElement('div');
    el.className = 'slot';
    el.innerHTML = '<div class="slot-num">P'+(i+1)+'</div>'
      + '<div class="slot-info"><div class="slot-producer">'+w.producer+'</div>'
      + (w.name ? '<div class="slot-name">'+w.name+'</div>' : '')
      + '</div><div class="slot-vintage">'+w.vintage+'</div>';
    list.appendChild(el);
  });
  hidePrint('standard');
  show('standard');
}

function goSwap() {
  if (!activeSeason) return;
  currentMode = 'swap';
  swapPairings = seasons[activeSeason].pairing.map(function(w){ return Object.assign({},w,{swapped:false}); });
  renderSwapSlots();
  hidePrint('swap');
  show('swap');
}

function renderSwapSlots() {
  var el = document.getElementById('swap-slots');
  el.innerHTML = '';
  swapPairings.forEach(function(w, i) {
    var s = document.createElement('div');
    s.className = 'slot swap-slot' + (w.swapped ? ' swapped' : '');
    s.innerHTML = (w.swapped ? '<span class="swap-badge">Swapped</span>' : '<div class="slot-num">P'+(i+1)+'</div>')
      + '<div class="slot-info"><div class="slot-producer">'+w.producer+'</div>'
      + (w.name ? '<div class="slot-name">'+w.name+'</div>' : '')
      + '</div><div class="slot-vintage">'+w.vintage+'</div>'
      + '<div class="swap-arrow">&#8250;</div>';
    s.onclick = function(){ openPicker(i); };
    el.appendChild(s);
  });
}

function openPicker(idx) {
  swapTarget = idx;
  document.getElementById('picker-search').value = '';
  renderPickerList(allWines);
  show('picker');
}

function renderPickerList(wines) {
  var el = document.getElementById('picker-list');
  el.innerHTML = '';
  wines.forEach(function(w) {
    var item = document.createElement('div');
    item.className = 'slot';
    item.style.cursor = 'pointer';
    item.innerHTML = '<div class="slot-info"><div class="slot-producer">'+w.producer+'</div>'
      + (w.name ? '<div class="slot-name">'+w.name+'</div>' : '')
      + '</div><div class="slot-vintage">'+w.vintage+'</div>';
    item.onclick = function() {
      swapPairings[swapTarget] = Object.assign({},w,{swapped:true});
      renderSwapSlots();
      show('swap');
    };
    el.appendChild(item);
  });
}

function filterPicker(q) {
  var lq = q.toLowerCase();
  renderPickerList(allWines.filter(function(w){
    return w.producer.toLowerCase().indexOf(lq)>-1||(w.name&&w.name.toLowerCase().indexOf(lq)>-1)||w.vintage.indexOf(q)>-1;
  }));
}

function goCustom() {
  currentMode = 'custom';
  customSel = [];
  document.getElementById('custom-search').value = '';
  renderCustomList(allWines);
  updateCustomCounter();
  hidePrint('custom');
  show('custom');
}

function renderCustomList(wines) {
  var el = document.getElementById('custom-list');
  el.innerHTML = '';
  wines.forEach(function(w) {
    var isSel = customSel.some(function(s){ return s.producer===w.producer&&s.name===w.name&&s.vintage===w.vintage; });
    var isDim = !isSel && customSel.length >= 5;
    var item = document.createElement('div');
    item.className = 'custom-item'+(isSel?' sel':'')+(isDim?' dim':'');
    item.innerHTML = '<div class="check-box"><span class="check-mark">&#10003;</span></div>'
      + '<div class="slot-info" style="flex:1"><div class="slot-producer">'+w.producer+'</div>'
      + (w.name ? '<div class="slot-name">'+w.name+'</div>' : '')
      + '</div><div class="slot-vintage">'+w.vintage+'</div>';
    item.onclick = function(){ toggleCustom(w); };
    el.appendChild(item);
  });
}

function toggleCustom(wine) {
  var idx = customSel.findIndex(function(s){ return s.producer===wine.producer&&s.name===wine.name&&s.vintage===wine.vintage; });
  if (idx > -1) customSel.splice(idx,1);
  else if (customSel.length < 5) customSel.push(wine);
  var q = document.getElementById('custom-search').value.toLowerCase();
  renderCustomList(q ? allWines.filter(function(w){ return w.producer.toLowerCase().indexOf(q)>-1||(w.name&&w.name.toLowerCase().indexOf(q)>-1); }) : allWines);
  updateCustomCounter();
}

function filterCustom(q) {
  var lq = q.toLowerCase();
  renderCustomList(lq ? allWines.filter(function(w){ return w.producer.toLowerCase().indexOf(lq)>-1||(w.name&&w.name.toLowerCase().indexOf(lq)>-1); }) : allWines);
}

function updateCustomCounter() {
  document.getElementById('custom-counter').textContent = customSel.length + ' / 5 selected';
