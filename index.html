<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Archipelago — Wine Pairing</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--k:#c8a96e;--kl:#d9be8a;--km:#a07840;--ink:#1a1008;--ink2:#2e1e0c;--ink3:#3d2b14;--cr:#f2e8d8;--cr2:#d9c9b0;--cr3:#b8a48a;--bd:#4a3318;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ink);height:100%;font-family:"Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;color:var(--cr);}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.screen.active{display:flex;}
.top-bar{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;gap:12px;}
.top-bar .b{fill:var(--k);}
.bar-title{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--km);flex:1;}
.back-btn{background:none;border:none;color:var(--km);font-family:inherit;font-size:14px;cursor:pointer;padding:6px 0;min-width:60px;}
.date-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.field-label{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--km);}
input[type=date]{background:var(--ink2);border:1px solid var(--bd);color:var(--cr);font-family:inherit;font-size:15px;padding:8px 12px;outline:none;flex:1;-webkit-appearance:none;border-radius:0;}
input[type=date]:focus{border-color:var(--k);}
.sec-pad{padding:12px 20px 8px;flex-shrink:0;}
.sec-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--km);}
.season-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px;flex-shrink:0;}
.season-btn{background:var(--ink2);border:1px solid var(--bd);color:var(--cr2);font-family:inherit;font-size:13px;padding:14px 12px;cursor:pointer;text-align:center;}
.season-btn.selected{background:rgba(200,169,110,.15);border-color:var(--k);color:var(--cr);}
.divider{height:1px;background:var(--bd);margin:12px 20px;flex-shrink:0;}
.actions{padding:0 20px 20px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.abtn{width:100%;padding:16px 20px;font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:14px;border:1px solid;text-align:left;}
.abtn .icon{font-size:18px;flex-shrink:0;}
.abtn .sub{font-size:11px;margin-top:2px;}
.abtn-gold{background:var(--k);border-color:var(--k);color:var(--ink);}
.abtn-gold .sub{color:var(--ink3);}
.abtn-gold:active{background:var(--kl);}
.abtn-gold:disabled{opacity:.35;pointer-events:none;}
.abtn-dark{background:var(--ink2);border-color:var(--bd);color:var(--cr);}
.abtn-dark .sub{color:var(--cr3);}
.abtn-dark:disabled{opacity:.35;pointer-events:none;}
.abtn-ghost{background:transparent;border-color:var(--bd);color:var(--cr3);}
.list-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 20px;display:flex;flex-direction:column;gap:6px;}
.slot{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--ink2);border:1px solid var(--bd);}
.swap-slot{cursor:pointer;}
.swap-slot:active{background:var(--ink3);}
.swap-slot.swapped{background:rgba(200,169,110,.12);border-color:var(--k);}
.slot-num{font-size:10px;letter-spacing:.2em;color:var(--km);width:22px;flex-shrink:0;text-align:center;}
.slot-info{flex:1;}
.slot-producer{font-size:14px;color:var(--cr);}
.slot-name{font-size:12px;font-style:italic;color:var(--cr2);margin-top:1px;}
.slot-meta{font-size:11px;color:var(--cr3);margin-top:1px;}
.slot-vintage{font-size:13px;color:var(--k);flex-shrink:0;}
.swap-badge{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink);background:var(--k);padding:2px 6px;flex-shrink:0;}
.swap-arrow{color:var(--km);font-size:18px;flex-shrink:0;}
.writein-btn{background:transparent;border:1px dashed var(--bd);color:var(--cr3);font-family:inherit;font-size:12px;padding:12px 16px;cursor:pointer;text-align:left;letter-spacing:.05em;}
.writein-btn:active{border-color:var(--km);color:var(--cr2);}
.writein-form{background:var(--ink2);border:1px solid var(--k);padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.writein-form input{background:var(--ink3);border:1px solid var(--bd);color:var(--cr);font-family:inherit;font-size:13px;padding:8px 10px;outline:none;border-radius:0;-webkit-appearance:none;width:100%;}
.writein-form input:focus{border-color:var(--k);}
.writein-form input::placeholder{color:var(--cr3);}
.writein-row{display:flex;gap:6px;}
.writein-save{background:var(--k);border:none;color:var(--ink);font-family:inherit;font-size:11px;font-weight:bold;letter-spacing:.2em;padding:10px;cursor:pointer;flex:1;}
.writein-cancel{background:transparent;border:1px solid var(--bd);color:var(--cr3);font-family:inherit;font-size:11px;padding:10px 14px;cursor:pointer;}
.bottom-bar{padding:12px 20px;border-top:1px solid var(--bd);flex-shrink:0;background:var(--ink);}
.search-wrap{padding:10px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.search-input{width:100%;background:var(--ink2);border:1px solid var(--bd);color:var(--cr);font-family:inherit;font-size:15px;padding:11px 14px;outline:none;border-radius:0;-webkit-appearance:none;}
.search-input:focus{border-color:var(--k);}
.search-input::placeholder{color:var(--cr3);}
.counter{padding:10px 20px;font-size:11px;letter-spacing:.15em;color:var(--km);border-bottom:1px solid var(--bd);flex-shrink:0;}
.custom-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--bd);cursor:pointer;}
.custom-item:active{background:var(--ink2);}
.custom-item.sel{background:rgba(200,169,110,.1);}
.custom-item.dim{opacity:.3;pointer-events:none;}
.check-box{width:20px;height:20px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.custom-item.sel .check-box{background:var(--k);border-color:var(--k);}
.check-mark{font-size:11px;color:var(--ink);display:none;}
.custom-item.sel .check-mark{display:block;}
#preview-overlay{position:fixed;inset:0;z-index:200;background:rgba(8,5,2,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;}
#preview-overlay.active{display:flex;}
.preview-hint{font-size:11px;color:var(--cr3);letter-spacing:.12em;text-align:center;}
.preview-btns{display:flex;gap:10px;}
.pbtn{padding:14px 28px;font-family:inherit;font-size:11px;font-weight:bold;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;border:none;}
.pbtn-go{background:var(--k);color:var(--ink);}
.pbtn-go:active{background:var(--kl);}
.pbtn-go:disabled{opacity:.5;pointer-events:none;}
.pbtn-back{background:transparent;border:1px solid var(--bd)!important;color:var(--cr3);}
#card-wrapper{background:#fff;padding:3px;box-shadow:0 20px 60px rgba(0,0,0,.8);}
#card{width:288px;height:480px;background:#c4a060;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 30px 32px;position:relative;overflow:hidden;font-family:"Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;}
#card::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(80,45,10,.22) 100%);z-index:1;}
#card>*{position:relative;z-index:2;}
#card .b{fill:#2a1806;}
#card-date{font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:#2a1806;opacity:.6;margin-bottom:8px;text-align:center;}
.card-rule{width:52px;height:1px;background:#2a1806;opacity:.25;margin-top:12px;margin-bottom:22px;}
#card-wines{display:flex;flex-direction:column;align-items:center;gap:0;text-align:center;width:100%;}
.card-wine{font-size:11px;color:#221405;letter-spacing:.03em;line-height:1.3;margin-bottom:12px;width:100%;}
.card-wine:last-child{margin-bottom:0;}
.card-wine em{font-style:italic;}
#card.no-bg{background:none!important;}
#card.no-bg::before{display:none!important;}
</style>
</head>

let allWines = WINE_DATA.fullList || [];
let seasons = WINE_DATA.seasons || {};

let activeSeason = null;
let swapPairings = [];
let swapTarget = null;
let customSel = [];

var _d = new Date();
document.getElementById('dinner-date').value =
  _d.getFullYear() + '-' + String(_d.getMonth()+1).padStart(2,'0') + '-' + String(_d.getDate()).padStart(2,'0');

function fmtDate(s) {
  if (!s) return '';
  var p = s.split('-'), mo = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return mo[+p[1]-1] + ' ' + +p[2] + ', ' + p[0];
}

function wineLabel(w) {
  // Comma-separated: Producer, Name, Grape, Vintage, AVA
  var parts = [w.producer, w.name, w.grape, w.vintage, w.ava];
  return parts.filter(function(p){ return p && p.trim(); }).join(', ');
}

function wineCardHtml(w) {
  // For card: Producer, Name italic, Grape, Vintage, AVA — all comma separated
  var html = w.producer;
  if (w.name) html += ', <em>' + w.name + '</em>';
  if (w.grape) html += ', ' + w.grape;
  if (w.vintage) html += ', ' + w.vintage;
  if (w.ava) html += ', ' + w.ava;
  return html;
}

function slotHtml(w, i, showNum) {
  return (showNum ? '<div class="slot-num">P'+(i+1)+'</div>' : '')
    + '<div class="slot-info">'
    + '<div class="slot-producer">'+w.producer+'</div>'
    + (w.name ? '<div class="slot-name">'+w.name+'</div>' : '')
    + ((w.grape||w.ava) ? '<div class="slot-meta">'+(w.grape||'')+(w.grape&&w.ava?', ':'')+(w.ava||'')+'</div>' : '')
    + '</div>'
    + '<div class="slot-vintage">'+w.vintage+'</div>';
}

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+id).classList.add('active');
}
function goHome() { closePreview(); show('home'); }

function renderSeasons() {
  var g = document.getElementById('season-grid');
  g.innerHTML = '';
  seasonNames.forEach(function(name) {
    var b = document.createElement('button');
    b.className = 'season-btn'; b.textContent = name;
    b.onclick = function(){ selectSeason(name, b); };
    g.appendChild(b);
  });
}

function selectSeason(name, btn) {
  activeSeason = name;
  swapPairings = seasons[name].pairing.map(function(w){ return Object.assign({},w,{swapped:false,writein:false}); });
  document.querySelectorAll('.season-btn').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  document.getElementById('btn-standard').disabled = false;
  document.getElementById('btn-swap').disabled = false;
}

function goStandard() {
  if (!activeSeason) return;
  document.getElementById('standard-title').textContent = activeSeason;
  var list = document.getElementById('pairing-list');
  list.innerHTML = '';
  seasons[activeSeason].pairing.forEach(function(w, i) {
    var el = document.createElement('div');
    el.className = 'slot';
    el.innerHTML = slotHtml(w, i, true);
    list.appendChild(el);
  });
  // Write-in button for each slot
  renderWriteInButtons(list, 'standard');
  show('standard');
}

function renderWriteInButtons(container, mode) {
  // Add write-in option after each pairing slot
  var slots = container.querySelectorAll('.slot:not(.write-in-slot)');
  slots.forEach(function(slot, i) {
    var btn = document.createElement('button');
    btn.className = 'writein-btn';
    btn.textContent = '+ Write in a wine for position ' + (i+1);
    btn.onclick = function(){ showWriteInForm(container, i, mode, btn); };
    slot.after(btn);
  });
}

function showWriteInForm(container, slotIndex, mode, triggerBtn) {
  // Remove any existing forms
  container.querySelectorAll('.writein-form').forEach(function(f){ f.remove(); });
  container.querySelectorAll('.writein-btn').forEach(function(b){ b.style.display=''; });

  triggerBtn.style.display = 'none';
  var form = document.createElement('div');
  form.className = 'writein-form';
  form.innerHTML =
    '<input type="text" placeholder="Producer *" id="wi-producer">' +
    '<input type="text" placeholder="Name" id="wi-name">' +
    '<div class="writein-row">' +
    '<input type="text" placeholder="Grape" id="wi-grape" style="flex:1">' +
    '<input type="text" placeholder="Vintage" id="wi-vintage" style="flex:0 0 80px">' +
    '</div>' +
    '<input type="text" placeholder="AVA" id="wi-ava">' +
    '<div class="writein-row">' +
    '<button class="writein-save" onclick="saveWriteIn(' + slotIndex + ', this)" data-mode="' + mode + '">Save</button>' +
    '<button class="writein-cancel" onclick="cancelWriteIn(this)">Cancel</button>' +
    '</div>';
  triggerBtn.after(form);
  form.querySelector('#wi-producer').focus();
}

function saveWriteIn(slotIndex, btn) { var mode = btn.getAttribute('data-mode');
  var producer = document.getElementById('wi-producer').value.trim();
  if (!producer) { alert('Producer is required.'); return; }
  var wine = {
    producer: producer,
    name: document.getElementById('wi-name').value.trim(),
    grape: document.getElementById('wi-grape').value.trim(),
    vintage: document.getElementById('wi-vintage').value.trim(),
    ava: document.getElementById('wi-ava').value.trim(),
    writein: true
  };
  if (mode === 'swap') {
    swapPairings[slotIndex] = Object.assign(wine, {swapped:true});
    renderSwapSlots();
  } else if (mode === 'standard') {
    // For standard, update and re-render
    goStandard();
    // Mark the slot visually — we don't modify the season data, just the preview
    // Store write-ins for preview
    if (!window._standardWriteIns) window._standardWriteIns = {};
    window._standardWriteIns[slotIndex] = wine;
  } else if (mode === 'custom') {
    // Replace the nth selected item
    customSel[slotIndex] = wine;
    renderCustomList(allWines);
    updateCustomCounter();
  }
}

function cancelWriteIn(btn) {
  var form = btn.closest('.writein-form');
  var container = form.parentElement;
  form.remove();
  container.querySelectorAll('.writein-btn').forEach(function(b){ b.style.display=''; });
}

function goSwap() {
  if (!activeSeason) return;
  swapPairings = seasons[activeSeason].pairing.map(function(w){ return Object.assign({},w,{swapped:false,writein:false}); });
  renderSwapSlots();
  show('swap');
}

function renderSwapSlots() {
  var el = document.getElementById('swap-slots');
  el.innerHTML = '';
  swapPairings.forEach(function(w, i) {
    var s = document.createElement('div');
    s.className = 'slot swap-slot' + (w.swapped ? ' swapped' : '');
    s.innerHTML = (w.swapped ? '<span class="swap-badge">'+(w.writein?'Written In':'Swapped')+'</span>' : '<div class="slot-num">P'+(i+1)+'</div>')
      + '<div class="slot-info"><div class="slot-producer">'+w.producer+'</div>'
      + (w.name ? '<div class="slot-name">'+w.name+'</div>' : '')
      + ((w.grape||w.ava) ? '<div class="slot-meta">'+(w.grape||'')+(w.grape&&w.ava?', ':'')+(w.ava||'')+'</div>' : '')
      + '</div><div class="slot-vintage">'+w.vintage+'</div>'
      + '<div class="swap-arrow">&#8250;</div>';
    s.onclick = function(){ openSwapOptions(i); };
    el.appendChild(s);
  });
}

function openSwapOptions(idx) {
  swapTarget = idx;
  // Show picker — also offer write-in at top
  document.getElementById('picker-search').value = '';
  renderPickerList(allWines, true);
  show('picker');
}

function renderPickerList(wines, showWriteIn) {
  var el = document.getElementById('picker-list');
  el.innerHTML = '';

  // Write-in option at the top
  if (showWriteIn) {
    var wiRow = document.createElement('div');
    wiRow.style.cssText = 'padding:0 0 2px;flex-shrink:0;';
    wiRow.innerHTML = '<button class="writein-btn" style="width:100%;border:none;padding:14px 20px;font-size:13px;" onclick="showPickerWriteIn()">&#9998; Write in a wine manually</button>';
    el.appendChild(wiRow);

    var wiForm = document.createElement('div');
    wiForm.id = 'picker-writein-form';
    wiForm.className = 'writein-form';
    wiForm.style.display = 'none';
    wiForm.style.margin = '0';
    wiForm.style.borderRadius = '0';
    wiForm.innerHTML =
      '<input type="text" placeholder="Producer *" id="pwi-producer">' +
      '<input type="text" placeholder="Name" id="pwi-name">' +
      '<div class="writein-row">' +
      '<input type="text" placeholder="Grape" id="pwi-grape" style="flex:1">' +
      '<input type="text" placeholder="Vintage" id="pwi-vintage" style="flex:0 0 80px">' +
      '</div>' +
      '<input type="text" placeholder="AVA" id="pwi-ava">' +
      '<div class="writein-row">' +
      '<button class="writein-save" onclick="savePickerWriteIn()">Use This Wine</button>' +
      '<button class="writein-cancel" onclick="hidePickerWriteIn()">Cancel</button>' +
      '</div>';
    el.appendChild(wiForm);
  }

  wines.forEach(function(w) {
    var item = document.createElement('div');
    item.className = 'slot';
    item.style.cursor = 'pointer';
    item.innerHTML = slotHtml(w, 0, false);
    item.onclick = function() {
      swapPairings[swapTarget] = Object.assign({},w,{swapped:true,writein:false});
      renderSwapSlots();
      show('swap');
    };
    el.appendChild(item);
  });
}

function showPickerWriteIn() {
  document.getElementById('picker-writein-form').style.display = 'flex';
  document.getElementById('pwi-producer').focus();
}
function hidePickerWriteIn() {
  document.getElementById('picker-writein-form').style.display = 'none';
}
function savePickerWriteIn() {
  var producer = document.getElementById('pwi-producer').value.trim();
  if (!producer) { alert('Producer is required.'); return; }
  swapPairings[swapTarget] = {
    producer: producer,
    name: document.getElementById('pwi-name').value.trim(),
    grape: document.getElementById('pwi-grape').value.trim(),
    vintage: document.getElementById('pwi-vintage').value.trim(),
    ava: document.getElementById('pwi-ava').value.trim(),
    swapped: true, writein: true
  };
  renderSwapSlots();
  show('swap');
}

function filterPicker(q) {
  var lq = q.toLowerCase();
  renderPickerList(allWines.filter(function(w){
    return w.producer.toLowerCase().indexOf(lq)>-1
      || (w.name&&w.name.toLowerCase().indexOf(lq)>-1)
      || (w.grape&&w.grape.toLowerCase().indexOf(lq)>-1)
      || w.vintage.indexOf(q)>-1;
  }), true);
}

function goCustom() {
  customSel = [];
  document.getElementById('custom-search').value = '';
  renderCustomList(allWines);
  updateCustomCounter();
  show('custom');
}

function renderCustomList(wines) {
  var el = document.getElementById('custom-list');
  el.innerHTML = '';

  // Write-in at top when under 5
  if (customSel.length < 5) {
    var wiBtn = document.createElement('button');
    wiBtn.className = 'writein-btn';
    wiBtn.style.cssText = 'width:100%;border-left:none;border-right:none;border-top:none;padding:12px 20px;';
    wiBtn.textContent = '&#9998; Write in a wine manually';
    wiBtn.onclick = function(){ toggleCustomWriteIn(el, wiBtn); };
    el.appendChild(wiBtn);
  }

  wines.forEach(function(w) {
    var isSel = customSel.some(function(s){ return s.producer===w.producer&&s.name===w.name&&s.vintage===w.vintage; });
    var isDim = !isSel && customSel.length >= 5;
    var item = document.createElement('div');
    item.className = 'custom-item'+(isSel?' sel':'')+(isDim?' dim':'');
    item.innerHTML = '<div class="check-box"><span class="check-mark">&#10003;</span></div>'
      + '<div class="slot-info" style="flex:1">'
      + '<div class="slot-producer">'+w.producer+'</div>'
      + (w.name ? '<div class="slot-name">'+w.name+'</div>' : '')
      + ((w.grape||w.ava) ? '<div class="slot-meta">'+(w.grape||'')+(w.grape&&w.ava?', ':'')+(w.ava||'')+'</div>' : '')
      + '</div><div class="slot-vintage">'+w.vintage+'</div>';
    item.onclick = function(){ toggleCustom(w); };
    el.appendChild(item);
  });
}

function toggleCustomWriteIn(container, btn) {
  var existing = container.querySelector('.writein-form');
  if (existing) { existing.remove(); btn.style.display=''; return; }
  btn.style.display = 'none';
  var form = document.createElement('div');
  form.className = 'writein-form';
  form.style.margin = '0';
  form.innerHTML =
    '<input type="text" placeholder="Producer *" id="cwi-producer">' +
    '<input type="text" placeholder="Name" id="cwi-name">' +
    '<div class="writein-row">' +
    '<input type="text" placeholder="Grape" id="cwi-grape" style="flex:1">' +
    '<input type="text" placeholder="Vintage" id="cwi-vintage" style="flex:0 0 80px">' +
    '</div>' +
    '<input type="text" placeholder="AVA" id="cwi-ava">' +
    '<div class="writein-row">' +
    '<button class="writein-save" onclick="saveCustomWriteIn()">Add to Pairing</button>' +
    '<button class="writein-cancel" onclick="cancelCustomWriteIn(this)">Cancel</button>' +
    '</div>';
  btn.after(form);
  form.querySelector('#cwi-producer').focus();
}

function saveCustomWriteIn() {
  var producer = document.getElementById('cwi-producer').value.trim();
  if (!producer) { alert('Producer is required.'); return; }
  var wine = {
    producer: producer,
    name: document.getElementById('cwi-name').value.trim(),
    grape: document.getElementById('cwi-grape').value.trim(),
    vintage: document.getElementById('cwi-vintage').value.trim(),
    ava: document.getElementById('cwi-ava').value.trim(),
    writein: true
  };
  customSel.push(wine);
  var q = document.getElementById('custom-search').value.toLowerCase();
  renderCustomList(q ? allWines.filter(function(w){ return w.producer.toLowerCase().indexOf(q)>-1; }) : allWines);
  updateCustomCounter();
}

function cancelCustomWriteIn(btn) {
  var form = btn.closest('.writein-form');
  var container = form.parentElement;
  form.remove();
  var wiBtn = container.querySelector('.writein-btn');
  if (wiBtn) wiBtn.style.display = '';
}

function toggleCustom(wine) {
  var idx = customSel.findIndex(function(s){ return s.producer===wine.producer&&s.name===wine.name&&s.vintage===wine.vintage; });
  if (idx > -1) customSel.splice(idx,1);
  else if (customSel.length < 5) customSel.push(wine);
  var q = document.getElementById('custom-search').value.toLowerCase();
  renderCustomList(q ? allWines.filter(function(w){ return w.producer.toLowerCase().indexOf(q)>-1||(w.name&&w.name.toLowerCase().indexOf(q)>-1); }) : allWines);
  updateCustomCounter();
}

function filterCustom(q) {
  var lq = q.toLowerCase();
  renderCustomList(lq ? allWines.filter(function(w){ return w.producer.toLowerCase().indexOf(lq)>-1||(w.name&&w.name.toLowerCase().indexOf(lq)>-1); }) : allWines);
}

function updateCustomCounter() {
  document.getElementById('custom-counter').textContent = customSel.length + ' / 5 selected';
  document.getElementById('btn-print-custom').disabled = customSel.length !== 5;
}

function showPreview(mode) {
  currentMode = mode;
  var pairings = mode==='standard' ? seasons[activeSeason].pairing
               : mode==='swap' ? swapPairings
               : customSel;

  // Apply any standard write-ins
  if (mode==='standard' && window._standardWriteIns) {
    pairings = pairings.map(function(w,i){ return window._standardWriteIns[i] || w; });
  }

  document.getElementById('card-date').textContent = fmtDate(document.getElementById('dinner-date').value);
  var el = document.getElementById('card-wines');
  el.innerHTML = '';
  pairings.forEach(function(w) {
    var block = document.createElement('div');
    block.className = 'card-wine';
    block.innerHTML = wineCardHtml(w);
    el.appendChild(block);
  });

  // Widow fix
  requestAnimationFrame(function() {
    el.querySelectorAll('.card-wine').forEach(function(block) {
      var lh = parseFloat(getComputedStyle(block).lineHeight) || 12;
      var lines = function() { return Math.round(block.getBoundingClientRect().height / lh); };
      if (lines() < 2) return;
      var html = block.innerHTML;
      for (var i = 0; i < 4; i++) {
        var last = html.lastIndexOf(' ');
        if (last === -1) break;
        var before = lines();
        var test = html.slice(0, last) + ' ' + html.slice(last + 1);
        block.innerHTML = test;
        if (lines() < before) { break; }
        html = test;
      }
    });
  });

  document.getElementById('preview-overlay').classList.add('active');
}

function closePreview() {
  document.getElementById('preview-overlay').classList.remove('active');
  window._standardWriteIns = {};
}

function generatePDF() {
  var btn = document.getElementById('pdf-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  var newTab = window.open('', '_blank');
  if (!newTab) {
    alert('Please allow popups for this site in Chrome settings.');
    btn.disabled = false; btn.textContent = 'Open PDF'; return;
  }
  newTab.document.write('<html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#888;font-size:14px;">Generating PDF…</body></html>');

  var card = document.getElementById('card');
  card.classList.add('no-bg');

  html2canvas(card, { scale:3, useCORS:true, backgroundColor:null, logging:false })
    .then(function(canvas) {
      card.classList.remove('no-bg');
      var pdf = new window.jspdf.jsPDF({ orientation:'portrait', unit:'in', format:[3,5] });
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 3, 5);
      var blob = pdf.output('blob');
      var url = URL.createObjectURL(blob);
      newTab.location.href = url;
      btn.disabled = false; btn.textContent = 'Open PDF';
    })
    .catch(function(err) {
      card.classList.remove('no-bg');
      newTab.close();
      btn.disabled = false; btn.textContent = 'Open PDF';
      alert('Error generating PDF.');
    });
}

renderSeasons();
</script>
